# Local / dev / staging-style stack. Override secrets via env file or CI.
#
# Full local stack (Mongo + API + Next):  docker compose --profile full up --build
# The API container must reach Mongo by Docker DNS name `mongo`, not 127.0.0.1.
# Host `.env` MONGODB_URI (127.0.0.1) is for `pnpm dev` only; compose uses COMPOSE_MONGODB_URI below.
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    # If host port 27017 is already taken (e.g. system mongod), set MONGO_PUBLISH_PORT=27018 in .env
    ports:
      - "${MONGO_PUBLISH_PORT:-27017}:27017"
    volumes:
      - pos_mongo_data:/data/db
    profiles:
      - mongo
      - full

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-staging}
      HOST: 0.0.0.0
      PORT: 4000
      MONGODB_URI: ${COMPOSE_MONGODB_URI:-mongodb://mongo:27017/pos_erp_dev}
      JWT_SECRET: ${JWT_SECRET:-change_me_use_long_secret_min_16_chars}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      STORAGE_PROVIDER: local
      STORAGE_ROOT_PATH: /data/storage
      TRUST_PROXY: "true"
      LOG_LEVEL: info
    volumes:
      - pos_api_storage:/data/storage
    depends_on:
      - mongo
    profiles:
      - full

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-POS ERP}
        NEXT_PUBLIC_ENV_NAME: ${NEXT_PUBLIC_ENV_NAME:-staging}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    profiles:
      - full

volumes:
  pos_mongo_data:
  pos_api_storage:
