# Build and push API + Web images to GitHub Container Registry (GHCR).
# Use on any VPS: docker pull … && docker compose with image: tags, or rebuild from this repo.
#
# Setup (one-time): repo Settings → Actions → General → Workflow permissions → Read and write.
#
# Run: Actions → "Docker publish" → Run workflow → set "Public API base URL" to your real API URL
#      (e.g. https://api.yourdomain.com). That value is baked into the web image at build time.

name: Docker publish

on:
  workflow_dispatch:
    inputs:
      next_public_api_base_url:
        description: "Browser-visible API URL baked into the web image"
        required: true
        default: "http://localhost:4000"
  push:
    tags:
      - "v*"

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image prefix (lowercase for GHCR)
        run: |
          echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set web build arg
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "NEXT_PUBLIC_API_BASE_URL=${{ inputs.next_public_api_base_url }}" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_API_BASE_URL=http://localhost:4000" >> "$GITHUB_ENV"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ env.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_APP_NAME=POS ERP
            NEXT_PUBLIC_ENV_NAME=production
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:latest
            ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
